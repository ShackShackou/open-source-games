<html lang="fr">
  <head>

    <title>Terre réaliste - Corse 3D</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hud">
      <h1>Terre réaliste → Corse 3D</h1>
